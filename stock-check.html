<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Check</title>
<style>
  :root {
    --bg: #ffffff;
    --surface: #f6f5f3;
    --border: #e4e1db;
    --text: #1c1b19;
    --muted: #807a70;
    --accent: #c8761b;        /* warm amber, like a lit bulb */
    --accent-press: #a9621433;
    --in: #2f8a4c;
    --in-bg: #e7f3ea;
    --low: #b07406;
    --low-bg: #fbf1dc;
    --out: #c2412f;
    --out-bg: #fbe9e6;
    --radius: 10px;
    --shadow: 0 1px 2px rgba(0,0,0,.05);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1b19;
      --surface: #262422;
      --border: #38352f;
      --text: #f0ede7;
      --muted: #9a948a;
      --accent: #e0902f;
      --in: #5fce86; --in-bg: #1d2e22;
      --low: #e0b257; --low-bg: #2e2616;
      --out: #f08a78; --out-bg: #2e1c19;
      --shadow: none;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 14px;
    line-height: 1.45;
    padding: 14px;
    -webkit-font-smoothing: antialiased;
  }
  h1 {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .04em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 12px;
  }
  form { display: flex; gap: 6px; margin-bottom: 14px; }
  input[type="text"] {
    flex: 1;
    min-width: 0;
    padding: 9px 11px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
  }
  input[type="text"]:focus {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
    border-color: var(--accent);
  }
  button {
    font-family: inherit;
    cursor: pointer;
    border: none;
    border-radius: var(--radius);
  }
  .check {
    padding: 9px 14px;
    background: var(--accent);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
  }
  .check:disabled { opacity: .55; cursor: default; }

  .state { color: var(--muted); padding: 18px 4px; text-align: center; font-size: 13px; }
  .state.error { color: var(--out); text-align: left; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    margin-bottom: 9px;
    box-shadow: var(--shadow);
  }
  .name { font-weight: 600; margin-bottom: 4px; word-break: break-word; }
  .sku {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px;
    color: var(--muted);
    word-break: break-all;
    margin-bottom: 10px;
  }
  .row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .stock { display: flex; align-items: baseline; gap: 6px; }
  .qty { font-size: 22px; font-weight: 700; line-height: 1; }
  .pill {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .03em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 999px;
  }
  .pill.in  { color: var(--in);  background: var(--in-bg); }
  .pill.low { color: var(--low); background: var(--low-bg); }
  .pill.out { color: var(--out); background: var(--out-bg); }
  .copy {
    padding: 6px 10px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 12px;
    font-weight: 600;
  }
  .copy:active { background: var(--accent-press); }
  .copy.done { color: var(--in); border-color: var(--in); }

  @media (prefers-reduced-motion: no-preference) {
    .card { animation: rise .18s ease both; }
    @keyframes rise { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  }
</style>
</head>
<body>
  <h1>Stock Check</h1>
  <form id="form">
    <input id="q" type="text" placeholder="Product code or name" autocomplete="off" autofocus>
    <button class="check" id="btn" type="submit">Check</button>
  </form>
  <div id="results"></div>

<script>
(function () {
  "use strict";

  // The Make webhook that looks up stock in BigCommerce.
  // If Make gives you a new webhook URL, paste it here.
  var WEBHOOK = "https://hook.us2.make.com/kptft8c6n7n7lw6g933xmgyllcy5uhyw";

  var form = document.getElementById("form");
  var input = document.getElementById("q");
  var btn = document.getElementById("btn");
  var resultsEl = document.getElementById("results");

  function setState(msg, isError) {
    resultsEl.innerHTML = "";
    var d = document.createElement("div");
    d.className = "state" + (isError ? " error" : "");
    d.textContent = msg;
    resultsEl.appendChild(d);
  }

  function pick(obj, keys) {
    for (var i = 0; i < keys.length; i++) {
      var k = keys[i];
      if (obj && obj[k] !== undefined && obj[k] !== null && obj[k] !== "") return obj[k];
    }
    return undefined;
  }

  // Accept lots of possible shapes coming back from Make / BigCommerce.
  function normalise(data) {
    var list = [];
    if (Array.isArray(data)) list = data;
    else if (data && Array.isArray(data.results)) list = data.results;
    else if (data && Array.isArray(data.data)) list = data.data;
    else if (data && typeof data === "object") list = [data];

    return list.map(function (item) {
      var qty = pick(item, ["stock", "inventory_level", "inventory", "qty", "quantity"]);
      return {
        name: pick(item, ["name", "product_name", "title"]) || "Unnamed product",
        sku: pick(item, ["sku", "code", "Sku", "SKU"]) || "—",
        stock: Number(qty != null ? qty : 0)
      };
    });
  }

  function statusFor(n) {
    if (n <= 0) return { cls: "out", label: "Out of stock" };
    if (n <= 5) return { cls: "low", label: "Low stock" };
    return { cls: "in", label: "In stock" };
  }

  function render(items) {
    if (!items.length) { setState("No products matched that. Try a different code or name."); return; }
    resultsEl.innerHTML = "";
    items.forEach(function (it) {
      var s = statusFor(it.stock);

      var card = document.createElement("div");
      card.className = "card";

      var name = document.createElement("div");
      name.className = "name"; name.textContent = it.name;

      var sku = document.createElement("div");
      sku.className = "sku"; sku.textContent = it.sku;

      var row = document.createElement("div");
      row.className = "row";

      var stock = document.createElement("div");
      stock.className = "stock";
      var qtyEl = document.createElement("span");
      qtyEl.className = "qty"; qtyEl.textContent = it.stock;
      var pill = document.createElement("span");
      pill.className = "pill " + s.cls; pill.textContent = s.label;
      stock.appendChild(qtyEl); stock.appendChild(pill);

      var copy = document.createElement("button");
      copy.className = "copy"; copy.type = "button"; copy.textContent = "Copy";
      copy.addEventListener("click", function () {
        var text = it.name + " (" + it.sku + "): " + it.stock + " in stock";
        navigator.clipboard.writeText(text).then(function () {
          copy.textContent = "Copied"; copy.classList.add("done");
          setTimeout(function () { copy.textContent = "Copy"; copy.classList.remove("done"); }, 1400);
        });
      });

      row.appendChild(stock);
      row.appendChild(copy);
      card.appendChild(name);
      card.appendChild(sku);
      card.appendChild(row);
      resultsEl.appendChild(card);
    });
  }

  form.addEventListener("submit", function (e) {
    e.preventDefault();
    var query = input.value.trim();
    if (!query) return;

    btn.disabled = true;
    setState("Checking…");

    fetch(WEBHOOK, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query: query })
    })
      .then(function (res) {
        if (!res.ok) throw new Error("Server returned " + res.status);
        return res.text();
      })
      .then(function (raw) {
        var data;
        try { data = JSON.parse(raw); }
        catch (e) { throw new Error("The reply wasn't readable. Check the webhook response is set to JSON."); }
        render(normalise(data));
      })
      .catch(function (err) {
        var cors = (err.message || "").indexOf("Failed to fetch") !== -1;
        setState(
          cors
            ? "Couldn't reach the lookup. Make sure the scenario is on and the webhook allows browser access."
            : err.message,
          true
        );
      })
      .then(function () { btn.disabled = false; });
  });
})();
</script>
</body>
</html>
